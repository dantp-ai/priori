name: Deploy marimo app to GitHub Pages

# Builds the WASM export of app.py and publishes it to GitHub Pages on every
# push to main. The app reads public/results.json (committed), so CI needs only
# marimo — no TabPFN / torch / GPU.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install marimo
        run: pip install marimo
      - name: Export notebook to static WASM
        run: marimo export html-wasm app.py -o _site --mode run
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
